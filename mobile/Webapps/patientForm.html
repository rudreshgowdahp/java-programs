<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            padding:40px;
            font-family:Arial, Helvetica, sans-serif;
        }

        form{
            max-width:600px;
            margin:auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #ced4da;
            border-radius:5px;
            font-size:16px;
            box-sizing:border-box;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#0d6efd;
            outline:none;
            box-shadow:0 0 5px rgba(13,110,253,.4);
        }

        textarea{
            resize:none;
        }

        button{
            width:100%;
            margin-top:25px;
        }

        @media(max-width:768px){
            body{
                padding:20px;
            }

            form{
                width:100%;
            }
        }
    </style>
</head>
<body>

<form action="createpatient" method="post">

    <h2>Hospital Patient Registration Form</h2>

    <label for="patientId">Patient ID</label>
    <input type="text" id="patientId" name="patientId" class="form-control">

    <label for="patientName">Patient Name</label>
    <input type="text" id="patientName" name="patientName" class="form-control">

    <label for="age">Age</label>
    <input type="number" id="age" name="age" class="form-control">

    <label for="gender">Gender</label>
    <select id="gender" name="gender" class="form-select">
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>

    <label for="bloodGroup">Blood Group</label>
    <select id="bloodGroup" name="bloodGroup" class="form-select">
        <option value="">Select Blood Group</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
    </select>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" class="form-control">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" class="form-control">

    <label for="doctorName">Doctor Name</label>
    <input type="text" id="doctorName" name="doctorName" class="form-control">

    <label for="appointmentDate">Appointment Date</label>
    <input type="date" id="appointmentDate" name="appointmentDate" class="form-control">

    <label for="medicalProblem">Medical Problem</label>
    <textarea id="medicalProblem" name="medicalProblem" rows="4" class="form-control"></textarea>

    <button type="submit" class="btn btn-primary">Book Appointment</button>

</form>

</body>
</html>
